name: Release Management
on:
  push:
    branches:
      - master
permissions:
  contents: write
jobs:
  check-version:
    name: Check Version Change
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.version-check.outputs.changed }}
      version: ${{ steps.version-check.outputs.version }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Parse and Compare Versions
        id: version-check
        run: |
          CURRENT_VERSION=$(git show HEAD:version.toml | sed -n 's/^version = "\(.*\)"/\1/p')
          echo "Current version: $CURRENT_VERSION"

          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            OLD_VERSION=$(git show HEAD~1:version.toml | sed -n 's/^version = "\(.*\)"/\1/p')
          else
            OLD_VERSION=""
          fi
          echo "Previous version: $OLD_VERSION"

          if [ "$CURRENT_VERSION" != "$OLD_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          fi
  build:
    name: Build Binaries (${{ matrix.target.os }}-${{ matrix.target.arch }})
    needs: [check-version]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - os: linux
            arch: amd64
            ext: ""
          - os: windows
            arch: amd64
            ext: ".exe"
          - os: darwin
            arch: amd64
            ext: ""
          - os: darwin
            arch: arm64
            ext: ""
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Go Toolchain
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install Cross Compilers (GCC / CGO)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc gcc-mingw-w64-x86-64 gcc-aarch64-linux-gnu
      - name: Build Binary
        run: |
          BIN_NAME="whatsrook${{ matrix.target.ext }}"
          if [ "${{ matrix.target.os }}" = "windows" ]; then
            CGO_ENABLED=1 CC=x86_64-w64-mingw32-gcc GOOS=windows GOARCH=amd64 go build -o $BIN_NAME .
          elif [ "${{ matrix.target.os }}" = "darwin" ]; then
            CGO_ENABLED=0 GOOS=darwin GOARCH=${{ matrix.target.arch }} go build -o $BIN_NAME .
          else
            CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -o $BIN_NAME .
          fi
      - name: Package Asset
        run: |
          mkdir staging
          cp whatsrook${{ matrix.target.ext }} staging/
          cp LICENSE staging/ 2>/dev/null || true
          cp README.md staging/ 2>/dev/null || true
          cp version.toml staging/ 2>/dev/null || true
          tar -czf whatsrook-${{ matrix.target.os }}-${{ matrix.target.arch }}.tar.gz -C staging .
      - name: Upload Intermediary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: whatsrook-${{ matrix.target.os }}-${{ matrix.target.arch }}
          path: whatsrook-${{ matrix.target.os }}-${{ matrix.target.arch }}.tar.gz
  alpha-release:
    name: Alpha Nightly Per-Commit Release
    needs: [check-version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Get Commit Info
        id: commit-info
        run: |
          echo "subject=$(git log -1 --format='%s')" >> $GITHUB_OUTPUT
          echo "body<<EOF" >> $GITHUB_OUTPUT
          git log -1 --format='%b' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Publish Alpha Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: alpha
          name: "Nightly / Alpha Build"
          body: |
            **${{ steps.commit-info.outputs.subject }}**

            ${{ steps.commit-info.outputs.body }}

            **Commit:** ${{ github.sha }}
          prerelease: true
          make_latest: false
          files: artifacts/*/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  production-release:
    name: Production Release
    needs: [check-version, build]
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code for Tagging
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Git Tag
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f -a "v${{ needs.check-version.outputs.version }}" -m "Release v${{ needs.check-version.outputs.version }}"
          git push -f origin "v${{ needs.check-version.outputs.version }}"
      - name: Publish Production Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.check-version.outputs.version }}"
          name: "Release v${{ needs.check-version.outputs.version }}"
          generate_release_notes: true
          draft: false
          prerelease: false
          files: artifacts/*/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


